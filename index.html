<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Will You Be My New Dream?</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body onload="startLanterns()">

    <div id="top-bar" class="cinema-bar top"></div>
    <div id="bottom-bar" class="cinema-bar bottom"></div>

    <audio id="tangledSong">
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <div class="water-horizon"></div>
    
    <img src="castle.png" class="castle-bg" alt="Castle">

    <div class="boat-scene">
        <img src="boat.png.png" class="boat-img" alt="Boat">
    </div>

    <div class="proposal-card" id="card">
        <h1 class="title">I have a question...</h1>
        <div class="stars">✨ ✨ ✨ ✨ ✨</div>
        <p class="question">Will you be my girlfriend?</p>
        
        <div class="button-container">
            <button id="yesBtn" class="gold-btn" onclick="celebrate()">YES! ✨</button>
            <button id="noBtn" class="gold-btn" onmouseover="evade()" ontouchstart="evade()">No</button>
        </div>
    </div>

    <div class="proposal-card hidden" id="celebration">
        <h1 class="title">Yay! ✨</h1>
        <div class="stars">✨ ✨ ✨ ✨ ✨</div>
        <img class="success-gif" src="https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExc242cnBnOG02ajU1bnExamJleHR1Z3A1bDc3NXpxMDRkZ2h6amhqeSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/rNmaq6keJtYNa/giphy.gif">
        <p class="question">At last I see the light...</p>
    </div>

    <div class="signature">Matt is awesome</div>

    <script>
        // 1. Initial Setup: Fills the sky immediately on load
        function startLanterns() {
            // Initial batch scattered in the sky
            for(let i = 0; i < 12; i++) {
                createLantern(true);
            }
            // Slow background trickle
            setInterval(() => createLantern(false), 2500);
        }

        // 2. Core Lantern Creation Logic (Unified for background & finale)
        function createLantern(isInitial = false) {
            const l = document.createElement('div');
            l.className = 'lantern';
            
            l.style.left = Math.random() * 100 + 'vw';
            
            // Randomize size and depth
            const depth = Math.random(); 
            const size = depth * 30 + 20; 
            l.style.width = size + 'px';
            l.style.height = (size * 1.3) + 'px';
            
            // Speed: Farther lanterns move slower (15s to 25s)
            const speed = (1 - depth) * 10 + 15; 
            l.style.animationDuration = speed + 's';
            
            if (isInitial) {
                // Scattered in the sky on load
                l.style.bottom = Math.random() * 100 + 'vh';
            } else {
                // Must start below the screen to fly UP (Matches CSS bottom: -100px)
                l.style.bottom = '-100px';
            }

            // Apply blur for atmospheric depth
            if (depth < 0.4) {
                l.style.filter = 'blur(1.5px)';
                l.style.opacity = '0.4';
            }

            document.body.appendChild(l);
            setTimeout(() => l.remove(), speed * 1000);
        }

        // 3. Interactive Sparkle Trail (Mouse movement)
        document.addEventListener('mousemove', (e) => {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            sparkle.style.left = e.pageX + 'px';
            sparkle.style.top = e.pageY + 'px';
            
            const size = Math.random() * 8 + 2;
            sparkle.style.width = size + 'px';
            sparkle.style.height = size + 'px';
            
            document.body.appendChild(sparkle);
            setTimeout(() => sparkle.remove(), 1000);
        });

        // 4. Button Evasion Logic
        function evade() {
            const btn = document.getElementById('noBtn');
            btn.style.position = 'fixed'; 
            const x = Math.random() * (window.innerWidth - 200);
            const y = Math.random() * (window.innerHeight - 200);
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }

        // 5. The Grand Finale (YES Click)
        function celebrate() {
            // Play Music
            const music = document.getElementById('tangledSong');
            music.play().catch(e => console.log("Music blocked until interaction:", e));

            // Activate Cinema Bars
            document.getElementById('top-bar').classList.add('active');
            document.getElementById('bottom-bar').classList.add('active');
            
            // Switch Cards
            document.getElementById('card').classList.add('hidden');
            document.getElementById('celebration').classList.remove('hidden');
            
            // Mass release of lanterns using the unified rise logic
            for(let i = 0; i < 80; i++) {
                setTimeout(() => {
                    createLantern(false);
                }, i * 300); 
            }
        }
    </script>
</body>
</html>
